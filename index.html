    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, onAuthStateChanged, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCEffkw1bYvWQPOEEgaFuOmGIgo3md-pAo",
        authDomain: "callisall.firebaseapp.com",
        projectId: "callisall",
        storageBucket: "callisall.firebasestorage.app",
        messagingSenderId: "455260687695",
        appId: "1:455260687695:web:c52b5cf68eccb8320d893a"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // Fungsi Login Username
      window.loginUser = async function() {
          const userVal = document.getElementById('username').value;
          const passVal = document.getElementById('password').value;
          const fakeEmail = userVal + "@callisall.com";
          try {
              await signInWithEmailAndPassword(auth, fakeEmail, passVal);
              alert("Login Berhasil!");
              window.location.reload();
          } catch (e) {
              alert("Gagal Login. Cek Username/Password!");
          }
      };

      onAuthStateChanged(auth, (user) => {
          if (!user) {
              document.getElementById('areaPesan').innerHTML = `
                <div style="text-align: center; border: 1px solid white; padding: 20px; border-radius: 10px;">
                  <p style="color: white;">Login Username dulu ya untuk memesan.</p>
                  <input type="text" id="username" class="form-control mb-2" placeholder="Username">
                  <div style="position: relative;">
                    <input type="password" id="password" class="form-control mb-2" placeholder="Password">
                    <span id="btnEye" style="position: absolute; right: 10px; top: 10px; cursor: pointer; color: white;"><i class="fas fa-eye" id="eyeIcon"></i></span>
                  </div>
                  <button type="button" onclick="loginUser()" class="btn btn-primary w-100">Login</button>
                </div>`;
              
              document.getElementById('btnEye').onclick = () => {
                  const p = document.getElementById('password');
                  p.type = p.type === "password" ? "text" : "password";
                  document.getElementById('eyeIcon').classList.toggle('fa-eye-slash');
              };
          }
      });
    </script>
