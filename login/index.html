<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CalliSall</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../fontawesome/css/fontawesome-all.min.css">
    <link rel="stylesheet" href="../css/tooplate-style.css">
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div id="tm-bg"></div>
    <div class="login-container">
        <form id="loginForm" class="login-card">
            <h2 class="text-center mb-4" style="color: white;">Masuk ke CalliSall</h2>
            
            <div class="form-group">
                <input type="text" id="username" class="form-control" placeholder="Username" required>
            </div>
            
            <div class="form-group position-relative">
                <input type="password" id="password" class="form-control" placeholder="Password" required>
                <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 15px; top: 15px; cursor: pointer; color: #666;"></i>
            </div>

            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
    </div>

    <script>
        // Fitur Toggle Password
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');
        togglePassword.addEventListener('click', function () {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
        });

        // Script Login Firebase tetap di sini (sesuaikan dengan script Anda sebelumnya)
    

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCEffkw1bYvWQPOEEgaFuOmGIgo3md-pAo",
        authDomain: "callisall.firebaseapp.com",
        projectId: "callisall",
        storageBucket: "callisall.firebasestorage.app",
        messagingSenderId: "455260687695",
        appId: "1:455260687695:web:c52b5cf68eccb8320d893a"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // 1. FUNGSI LOGIN GOOGLE
      document.getElementById('googleLoginBtn').addEventListener('click', () => {
        const provider = new GoogleAuthProvider();
        signInWithPopup(auth, provider)
          .then(() => {
            alert("Berhasil masuk dengan Google!");
            window.location.href = "../index.html"; 
          }).catch((err) => alert("Gagal: " + err.message));
      });

      // 2. FUNGSI LOGIN EMAIL/PASS
      document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, email, pass)
          .then(() => {
            window.location.href = "../index.html";
          }).catch(() => alert("Email atau Password salah!"));
      });

      // 3. FUNGSI LUPA PASSWORD
      document.getElementById('forgotPasswordBtn').addEventListener('click', (e) => {
        e.preventDefault();
        const email = document.getElementById('username').value;
        if(!email) return alert("Ketik emailmu di kotak username dulu!");
        sendPasswordResetEmail(auth, email)
          .then(() => alert("Cek email kamu untuk reset password!"))
          .catch((err) => alert(err.message));
      });
    </script>
</body>
</html>
