<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login CalliSall</title>
    <!-- Tambahkan CSS agar rapi -->
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; background: #555; font-family: sans-serif; }
        .login-box { background: white; padding: 30px; border-radius: 10px; width: 300px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #007bff; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="login-box">
        <h3>Login CalliSall</h3>
        <input type="text" id="username" placeholder="Masukkan Nama (Tanpa Email)">
        <button onclick="doLogin()">Masuk</button>
    </div>

    <script>
        function doLogin() {
            const user = document.getElementById('username').value;
            if(user.length > 0) {
                localStorage.setItem('isLoggedIn', 'true');
                alert("Berhasil Login!");
                window.location.href = "../index.html"; // Kembali ke home
            } else {
                alert("Nama tidak boleh kosong!");
            }
        }
    </script>
</body>
</html>
