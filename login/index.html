<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CalliSall</title>
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div class="login-container">
        <form id="loginForm" class="login-form">
            <h2>Masuk ke CalliSall</h2>
            
            <div class="input-group">
                <input type="email" id="username" placeholder="Email" required>
            </div>
            
            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
            </div>

            <button type="submit" class="login-btn">Sign In</button>

            <div class="form-options">
                <a href="#" id="forgotPasswordBtn" style="color: white; font-size: 12px;">Lupa password?</a>
            </div>

            <div class="separator"><span>Atau</span></div>

            <button type="button" id="googleLoginBtn" class="google-btn" style="width: 100%; background: white; color: #444; border: none; padding: 10px; border-radius: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18" style="margin-right: 10px;">
                Lanjutkan dengan Google
            </button>
        </form>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      const firebaseConfig = {
        apiKey: "AIzaSyCEffkw1bYvWQPOEEgaFuOmGIgo3md-pAo",
        authDomain: "callisall.firebaseapp.com",
        projectId: "callisall",
        storageBucket: "callisall.firebasestorage.app",
        messagingSenderId: "455260687695",
        appId: "1:455260687695:web:c52b5cf68eccb8320d893a"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // 1. FUNGSI LOGIN GOOGLE
      document.getElementById('googleLoginBtn').addEventListener('click', () => {
        const provider = new GoogleAuthProvider();
        signInWithPopup(auth, provider)
          .then(() => {
            alert("Berhasil masuk dengan Google!");
            window.location.href = "../index.html"; 
          }).catch((err) => alert("Gagal: " + err.message));
      });

      // 2. FUNGSI LOGIN EMAIL/PASS
      document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        signInWithEmailAndPassword(auth, email, pass)
          .then(() => {
            window.location.href = "../index.html";
          }).catch(() => alert("Email atau Password salah!"));
      });

      // 3. FUNGSI LUPA PASSWORD
      document.getElementById('forgotPasswordBtn').addEventListener('click', (e) => {
        e.preventDefault();
        const email = document.getElementById('username').value;
        if(!email) return alert("Ketik emailmu di kotak username dulu!");
        sendPasswordResetEmail(auth, email)
          .then(() => alert("Cek email kamu untuk reset password!"))
          .catch((err) => alert(err.message));
      });
    </script>
</body>
</html>
