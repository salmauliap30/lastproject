<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CalliSall</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
            /* Warna gradient disamakan dengan background utama */
            background: linear-gradient(135deg, #7042f4 0%, #d43afb 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background: rgba(0, 0, 0, 0.6); /* Transparan gelap agar elegan */
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 15px 25px rgba(0,0,0,.5);
            width: 320px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        h2 {
            color: #fff;
            margin-bottom: 30px;
            font-weight: 300;
            letter-spacing: 2px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 5px;
            color: white;
            outline: none;
            box-sizing: border-box;
        }

        input::placeholder {
            color: rgba(255,255,255,0.7);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #d43afb; /* Warna pink/ungu senada */
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #7042f4;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Masuk CalliSall</h2>
        
        <div class="input-group">
            <input type="text" id="username" placeholder="Username" required>
        </div>
        
        <div class="input-group">
            <input type="password" id="password" placeholder="Password" required>
        </div>

        <button onclick="handleLogin(// Tambahkan baris ini di dalam fungsi handleLogin() di halaman login:
localStorage.setItem('everLoggedIn', 'true'); // Menandai pengguna lama
localStorage.setItem('isLoggedIn', 'true');
)">Sign In</button>
        
        <a href="../index.html" class="back-link">← Kembali ke Beranda</a>
    </div>

    <script>
        function handleLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;

            // Kita buat simple: asal diisi, login berhasil
            if(user.length > 0 && pass.length > 0) {
                localStorage.setItem('isLoggedIn', 'true');
                alert("Selamat datang kembali, " + user + "!");
                window.location.href = "../index.html"; 
            } else {
                alert("Isi username dan password dulu ya!");
            }
        }
    </script>
</body>
</html>
