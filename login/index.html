<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CalliSall</title>
    <link rel="stylesheet" href="../css/bootstrap.min.css">
    <link rel="stylesheet" href="../fontawesome/css/fontawesome-all.min.css">
    <link rel="stylesheet" href="../css/tooplate-style.css">
    <link rel="stylesheet" href="style.css"> 
</head>
<body>
    <div id="tm-bg"></div>
    <div class="login-container">
        <form id="loginForm" class="login-card">
            <h2 class="text-center mb-4" style="color: white;">Masuk ke CalliSall</h2>
            
            <div class="form-group">
                <input type="text" id="username" class="form-control" placeholder="Email/Username" required>
            </div>
            
            <div class="form-group position-relative">
                <input type="password" id="password" class="form-control" placeholder="Password" required>
                <i class="fas fa-eye" id="togglePassword" style="position: absolute; right: 15px; top: 15px; cursor: pointer; color: #666;"></i>
            </div>

            <button type="submit" class="btn btn-primary w-100">Sign In</button>
        </form>
    </div>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

      // 1. Logika Toggle Password
      const togglePassword = document.querySelector('#togglePassword');
      const passwordField = document.querySelector('#password');
      togglePassword.addEventListener('click', function () {
          const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
          passwordField.setAttribute('type', type);
          this.classList.toggle('fa-eye-slash');
      });

      // 2. Inisialisasi Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyCEffkw1bYvWQPOEEgaFuOmGIgo3md-pAo",
        authDomain: "callisall.firebaseapp.com",
        projectId: "callisall",
        storageBucket: "callisall.firebasestorage.app",
        messagingSenderId: "455260687695",
        appId: "1:455260687695:web:c52b5cf68eccb8320d893a"
      };

      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);

      // 3. FUNGSI LOGIN EMAIL/PASS
      document.getElementById('loginForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const email = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        
        signInWithEmailAndPassword(auth, email, pass)
          .then(() => {
            window.location.href = "../index.html";
          }).catch((err) => {
            alert("Gagal: " + err.message);
          });
      });
    </script>
</body>
</html>
