<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CalliSall</title>
    <!-- Font Awesome untuk ikon mata -->
    <link rel="stylesheet" href="../fontawesome/css/fontawesome-all.min.css">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Open Sans', sans-serif;
            background: linear-gradient(135deg, #7042f4 0%, #d43afb 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .login-wrapper {
            text-align: center;
            width: 450px;
        }

        /* Judul besar di luar kotak sesuai gambar 24174.png */
        .main-title {
           white-space: nowrap;
           font-family: 'Open Sans', sans-serif;
           font-size: 45px;
           font-weight: 300;
           color: white;
           letter-spacing: 0;
           margin-bottom: 30px;
           text-transform: none;
        }
        

        /* Kotak besar (border biru di gambar) */
        .login-box-container {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.5); /* Sesuai kotak di gambar */
            padding: 30px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .input-wrapper {
            position: relative;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            padding-right: 45px;
            background: rgba(255,255,255,0.1);
            border: 1px solid white;
            border-radius: 5px;
            color: white;
            outline: none;
            box-sizing: border-box;
            font-size: 16px;
            }
        

        /* Ikon mata di dalam password */
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.7;
            z-index: 10;
        }

        button {
            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid white; /* Tombol border putih sesuai gambar */
            border-radius: 5px;
            color: white;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Teks "Sudah Punya Akun?" di luar kotak */
        .alt-action {
            margin-top: 15px;
            font-size: 1.1rem;
        }

        .alt-action a {
            color: white;
            text-decoration: underline;
            font-weight: bold;
        }

        .back-link {
            display: block;
            margin-top: 40px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <h1 class="main-title" id="login-title">LOGIN to CalliSall</h1>
        
        <!-- Kotak pembungkus sesuai gambar -->
        <div class="login-box-container">
            <div class="input-wrapper">
                <input type="text" id="username" placeholder="Username" required>
            </div>
            
            <div class="input-wrapper">
                <input type="password" id="password" placeholder="Password" required>
                <i class="fas fa-eye-slash toggle-password" id="togglePassword"></i>
            </div>

            <div class="input-wrapper" id="email-wrapper" style="display:none;">
              <input type="email" id="email" placeholder="Email">
            </div>
            
            <button onclick="handleLogin()" id="btn-text">Login</button>
        </div>

        <a href="#" id="forgot-link" onclick="forgotPassword()">Lupa Password?</a>
        
        <!-- Bagian Masuk sesuai gambar 24174.png -->
        <div class="alt-action" id="switch-text">
         Belum Punya Akun?
         <button type="button" onclick="switchToSignIn()">
         Daftar
         </button>
        </div>
        
        <a href="../index.html" class="back-link">← kembali ke Beranda</a>
    </div>

    <script>
        // Fungsi Mata Password
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#password');

        togglePassword.addEventListener('click', function () {

    if(password.type === 'password') {
        password.type = 'text';

        // mata terbuka
        this.classList.remove('fa-eye-slash');
        this.classList.add('fa-eye');

    } else {
        password.type = 'password';

        // mata tertutup
        this.classList.remove('fa-eye');
        this.classList.add('fa-eye-slash');
    }

});
        

        function forgotPassword(){

          const email = localStorage.getItem("savedEmail");
          const username = localStorage.getItem("savedUser");
          const password = localStorage.getItem("savedPass");

          if(!email){
            alert("Email belum terdaftar!");
            return;
          }

          emailjs.send(
            "service_el36h5i",
            "template_yvz9q79",
            {
              username: username,
              password: password,
              email: email
            }
         )
         .then(function(){

           alert("Password berhasil dikirim ke emailmu!");

         })
         .catch(function(error){

          console.log(error);

          alert(
           "Status: " + error.status +
           "\nText: " + error.text
          );

         });
        }
        
        function switchToSignIn(){

          document.getElementById('login-title').innerText = "REGISTER to CalliSall";

          document.getElementById('btn-text').innerText = "Register";

          document.getElementById('email-wrapper').style.display = "block";

          document.getElementById('switch-text').innerHTML =
          'Sudah Punya Akun? <a href="#" onclick="switchToLogin()">Login</a>';

          document.getElementById('forgot-link').style.display = "none";
        }

        function switchToLogin(){

          document.getElementById('login-title').innerText = "LOGIN to CalliSall";

          document.getElementById('btn-text').innerText = "Login";

          document.getElementById('email-wrapper').style.display = "none";

          document.getElementById('switch-text').innerHTML =
          'Belum Punya Akun? <a href="#" onclick="switchToSignIn()">Daftar</a>';

          document.getElementById('forgot-link').style.display = "inline";
        }
        // Cek status saat load
        

        
        // Langsung masuk otomatis kalau masih login
        if(localStorage.getItem('isLoggedIn') === 'true'){
            window.location.href = "../index.html";
        }
    


        function handleLogin() {

         const user = document.getElementById('username').value;
         const pass = document.getElementById('password').value;
         const emailField = document.getElementById('email');

         if(user.length > 0 && pass.length > 0) {

          // MODE REGISTER
          if(document.getElementById('btn-text').innerText === "Register") {

           localStorage.setItem("savedUser", user);
           localStorage.setItem("savedPass", pass);
           localStorage.setItem("savedEmail", emailField.value);

           alert("Registrasi berhasil!");

           switchToLogin();

           return;
          }

          // MODE LOGIN
          if(
           user === localStorage.getItem("savedUser") &&
           pass === localStorage.getItem("savedPass")
          ){

           localStorage.setItem("isLoggedIn", "true");

           alert("Selamat datang, " + user + "!");

           window.location.href = "../index.html";

          } else {

            alert("Username atau password salah!");

          }

         } else {

          alert("Isi dulu ya!");

         }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

    <script>

    emailjs.init("o7qYU0fbDKWeu2Onq");
    </script>
</body>
</html>
